<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sameer's Portfolio</title>
    <script>
      // spa-github-pages: GitHub Pages serves this for any path that has no
      // real file (e.g. /contact). Re-encode the path as a query string and
      // bounce to index.html, where the inverse script restores the URL
      // before React Router mounts. pathSegmentsToKeep = 0 (custom domain).
      var pathSegmentsToKeep = 0;
      var l = window.location;
      // The blog is a separate static export with its own 404 page.
      if (l.pathname.indexOf("/blogs/") === 0) {
        l.replace(l.origin + "/blogs/404.html");
      } else l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
